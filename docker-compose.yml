name: interview-assistant

# 开发/自建编排：本地构建镜像（image 标签与 GHCR 一致，便于推送/拉取）。
# 用法：
#   cp .env.example .env            # 只需填 3 个 key
#   docker compose up -d --build
# 手机只需访问 backend 的 8000 端口（同源 /ws 与 /ctx，内部反代到各服务）。
# 除 3 个 key 外，配置均已写死在本文件。

services:
  backend:
    image: ghcr.io/skadli/interview-backend:latest
    build:
      context: .
      dockerfile: backend-go/Dockerfile
    ports:
      - "8000:8000"                 # 对外唯一入口：前端 + /ws + /ctx
    environment:
      ADDR: ":8000"
      FRONTEND_DIR: /app/web/dist
      ASR_PROVIDER: volc            # 免 key 先跑通界面：改成 mock
      LLM_PROVIDER: ark             # 免 key 先跑通界面：改成 mock
      VOLC_APP_KEY: ${VOLC_APP_KEY:-}        # ← 在 .env 填
      VOLC_ACCESS_KEY: ${VOLC_ACCESS_KEY:-}  # ← 在 .env 填
      ARK_API_KEY: ${ARK_API_KEY:-}          # ← 在 .env 填
      VOLC_RESOURCE_ID: volc.bigasr.sauc.duration
      VOLC_ASR_URL: wss://openspeech.bytedance.com/api/v3/sauc/bigmodel
      ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
      MODEL_FAST: doubao-seed-1.6-flash
      MODEL_STRONG: doubao-seed-1.6
      SPEAKER_SIDECAR_URL: http://voiceprint:8101
      SPEAKER_THRESH: "0.75"
      CONTEXT_URL: http://context:8102
      ENDPOINT_MS: "650"
    depends_on:
      voiceprint:
        condition: service_started   # 声纹加载 torch 较慢；未就绪时后端自动降级(全判面试官)，不阻塞启动
      context:
        condition: service_healthy   # 上下文很快；前端 /ctx 依赖它，等其就绪
    restart: unless-stopped

  voiceprint:
    image: ghcr.io/skadli/interview-voiceprint:latest
    build:
      context: .
      dockerfile: services/voiceprint/Dockerfile
    environment:
      PORT: "8101"
      SPEAKER_THRESH: "0.75"
      SESSION_TTL_SEC: "1800"
      MAX_SESSIONS: "500"
    expose:
      - "8101"                      # 仅内网；不对外暴露
    restart: unless-stopped

  context:
    image: ghcr.io/skadli/interview-context:latest
    build:
      context: .
      dockerfile: services/context/Dockerfile
    environment:
      PORT: "8102"
      ARK_API_KEY: ${ARK_API_KEY:-}          # ← 在 .env 填
      ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
    expose:
      - "8102"                      # 仅内网；前端经 backend 的 /ctx 反代访问
    restart: unless-stopped
