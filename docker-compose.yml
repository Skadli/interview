name: interview-assistant

# 开发/自建编排：本地构建镜像。只需在 .env 填 key，其余用镜像内置默认值。
#   cp .env.example .env
#   docker compose up -d --build

services:
  backend:
    image: ghcr.io/skadli/interview-backend:latest
    build:
      context: .
      dockerfile: backend-go/Dockerfile
    ports:
      - "8000:8000"                              # 对外唯一入口（前端 + /ws + /ctx）
    environment:
      ASR_PROVIDER: volc                         # 免 key 先跑通界面就改成 mock
      LLM_PROVIDER: ark                          # 免 key 先跑通界面就改成 mock
      MODEL_FAST: doubao-seed-1.6-flash
      MODEL_STRONG: doubao-seed-1.6
      SPEAKER_SIDECAR_URL: http://voiceprint:8101  # 指向内网服务，必须设
      CONTEXT_URL: http://context:8102             # 指向内网服务，必须设
      VOLC_API_KEY: ${VOLC_API_KEY:-}            # ← .env（火山语音 ASR，新版统一鉴权）
      VOLC_RESOURCE_ID: ${VOLC_RESOURCE_ID:-volc.bigasr.sauc.duration}
      ARK_API_KEY: ${ARK_API_KEY:-}             # ← .env（方舟豆包 LLM，另一个 key）
    depends_on:
      voiceprint:
        condition: service_started
      context:
        condition: service_healthy
    restart: unless-stopped

  voiceprint:
    image: ghcr.io/skadli/interview-voiceprint:latest
    build:
      context: .
      dockerfile: services/voiceprint/Dockerfile
    ports:
      - "8101:8101"
    restart: unless-stopped

  context:
    image: ghcr.io/skadli/interview-context:latest
    build:
      context: .
      dockerfile: services/context/Dockerfile
    ports:
      - "8102:8102"
    environment:
      ARK_API_KEY: ${ARK_API_KEY:-}             # ← .env（与 backend 同一个方舟 key）
    restart: unless-stopped
