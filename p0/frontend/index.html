<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AI面试助手 · P0验证台</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>P0 验证台</h1>
    <div id="status" class="status">未连接</div>
  </header>

  <div class="btns">
    <button id="btnConnect">① 连接</button>
    <button id="btnEnroll" disabled>② 声纹注册</button>
    <button id="btnListen" disabled>③ 开始监听</button>
    <button id="btnMode" disabled>模式：口语化</button>
  </div>

  <section class="card">
    <div class="label">实时识别（含说话人判定）</div>
    <div id="transcript" class="transcript">—</div>
  </section>

  <section class="card">
    <div class="label">面试官问题</div>
    <div id="question" class="question">—</div>
  </section>

  <section class="card answer-card">
    <div class="label">AI 参考回答（流式）</div>
    <div id="answer" class="answer">—</div>
  </section>

  <div id="latency" class="latency">延迟：—</div>

  <p class="hint">提示：手机访问需 HTTPS（麦克风权限要求）；面试官声音需电脑外放。先在电脑 localhost 验证管道，再上手机。</p>

  <script src="/static/app.js"></script>
</body>
</html>
