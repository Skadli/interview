name: interview-assistant

# 生产编排：拉取 GHCR 预构建镜像。只需在 .env 填 3 个 key，其余用镜像内置默认值。
#   cp .env.example .env
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ghcr.io/skadli/interview-backend:latest
    ports:
      - "8000:8000"                              # 对外唯一入口（前端 + /ws + /ctx）
    environment:
      ASR_PROVIDER: volc                         # 免 key 先跑通界面就改成 mock
      LLM_PROVIDER: ark                          # 免 key 先跑通界面就改成 mock
      MODEL_FAST: doubao-seed-1.6-flash
      MODEL_STRONG: doubao-seed-1.6
      SPEAKER_SIDECAR_URL: http://voiceprint:8101  # 指向内网服务，必须设
      CONTEXT_URL: http://context:8102             # 指向内网服务，必须设
      VOLC_APP_KEY: ${VOLC_APP_KEY:-}            # ← .env
      VOLC_ACCESS_KEY: ${VOLC_ACCESS_KEY:-}      # ← .env
      ARK_API_KEY: ${ARK_API_KEY:-}             # ← .env
    depends_on:
      voiceprint:
        condition: service_started
      context:
        condition: service_healthy
    restart: unless-stopped

  voiceprint:
    image: ghcr.io/skadli/interview-voiceprint:latest
    ports:
      - "8101:8101"                              # 公网服务器建议改 "127.0.0.1:8101:8101" 只本机可访问
    restart: unless-stopped

  context:
    image: ghcr.io/skadli/interview-context:latest
    ports:
      - "8102:8102"                              # 公网服务器建议改 "127.0.0.1:8102:8102" 只本机可访问
    environment:
      ARK_API_KEY: ${ARK_API_KEY:-}             # ← .env（简历结构化/公司简报用，与上面同一个 key）
    restart: unless-stopped
