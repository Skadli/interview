name: interview-assistant

# 生产：拉取 GHCR 单镜像（三合一）。只需 .env 填 key。
#   cp .env.example .env
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ghcr.io/skadli/interview:latest
    ports:
      - "8000:8000"                              # 对外唯一入口（前端 + /ws + /ctx）
    environment:
      ASR_PROVIDER: volc
      LLM_PROVIDER: ark
      MODEL_FAST: doubao-seed-2-0-mini-260428
      MODEL_STRONG: doubao-seed-2-0-mini-260428
      ARK_CONTEXT_CACHE: ${ARK_CONTEXT_CACHE:-false}
      VOLC_API_KEY: ${VOLC_API_KEY:-}            # ← .env（火山语音 ASR）
      VOLC_RESOURCE_ID: ${VOLC_RESOURCE_ID:-volc.bigasr.sauc.duration}
      VOLC_ASR_MODEL: ${VOLC_ASR_MODEL:-bigmodel}
      ARK_API_KEY: ${ARK_API_KEY:-}             # ← .env（方舟豆包 LLM）
    restart: unless-stopped
