name: build-and-publish

# 触发：推送到 main / 打 v* 标签 / 手动。
# 产物：3 个镜像推送到 GHCR（ghcr.io/<owner>/interview-{backend,voiceprint,context}）。
# 可选：打标签时若配置了 SSH 密钥，自动 SSH 到服务器拉取并发布。

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: interview-backend
            dockerfile: backend-go/Dockerfile
          - image: interview-voiceprint
            dockerfile: services/voiceprint/Dockerfile
          - image: interview-context
            dockerfile: services/context/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # GHCR 要求镜像路径全小写，owner 可能含大写，这里转小写
      - id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # 仅在 main 推送或打标签时尝试部署
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    steps:
      - name: 检查是否配置了部署密钥
        id: chk
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_HOST }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "未配置 DEPLOY_SSH_HOST，跳过自动部署（仅发布镜像）。"
          fi

      - name: SSH 到服务器拉取并发布
        if: steps.chk.outputs.ok == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # 若 GHCR 包私有，需登录（在服务器配 GHCR_USER/GHCR_TOKEN secret）
            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            fi
            export TAG=latest
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
